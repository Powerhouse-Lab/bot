<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jellyfin Mobile Client preview</title>
  <desc id="desc">Two phone mockups showing the Jellyfin Mobile sign-in screen and signed-in home screen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10131F"/>
      <stop offset="1" stop-color="#1A1028"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#AA5CC3"/>
      <stop offset="1" stop-color="#8B3DAF"/>
    </linearGradient>
    <linearGradient id="posterA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#AA5CC3"/>
      <stop offset="1" stop-color="#282F48"/>
    </linearGradient>
    <linearGradient id="posterB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#25C2A0"/>
      <stop offset="1" stop-color="#20263A"/>
    </linearGradient>
    <linearGradient id="posterC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#20263A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <circle cx="196" cy="122" r="180" fill="#AA5CC3" opacity="0.13"/>
  <circle cx="1110" cy="720" r="250" fill="#8B3DAF" opacity="0.16"/>
  <path d="M136 662C290 546 374 610 512 512C650 414 724 235 930 256C1036 267 1102 327 1180 398" stroke="#AA5CC3" stroke-opacity="0.18" stroke-width="3"/>

  <text x="640" y="74" text-anchor="middle" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900" letter-spacing="-1.4">Jellyfin Mobile Client</text>
  <text x="640" y="112" text-anchor="middle" fill="#A9B0C3" font-family="Inter, Arial, sans-serif" font-size="18">Preview of login, browsing, search, and media screens</text>

  <!-- Login phone -->
  <g filter="url(#shadow)">
    <rect x="238" y="154" width="328" height="604" rx="42" fill="#070912"/>
    <rect x="252" y="168" width="300" height="576" rx="32" fill="#10131F"/>
    <rect x="350" y="181" width="104" height="18" rx="9" fill="#070912"/>
  </g>
  <g transform="translate(282 224)">
    <text x="0" y="0" fill="#AA5CC3" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="1.1">OPEN MEDIA, ANYWHERE</text>
    <text x="0" y="48" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" letter-spacing="-1.2">Jellyfin</text>
    <text x="0" y="88" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" letter-spacing="-1.2">Mobile</text>
    <text x="0" y="124" fill="#A9B0C3" font-family="Inter, Arial, sans-serif" font-size="15">Connect to your self-hosted</text>
    <text x="0" y="146" fill="#A9B0C3" font-family="Inter, Arial, sans-serif" font-size="15">Jellyfin server.</text>

    <rect x="0" y="184" width="240" height="288" rx="24" fill="#171B2A" stroke="#2B3248"/>
    <text x="22" y="222" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Server URL</text>
    <rect x="22" y="236" width="196" height="48" rx="14" fill="#10131F" stroke="#2B3248"/>
    <text x="38" y="266" fill="#A9B0C3" font-family="Inter, Arial, sans-serif" font-size="13">jellyfin.example.com</text>
    <text x="22" y="316" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Username</text>
    <rect x="22" y="330" width="196" height="48" rx="14" fill="#10131F" stroke="#2B3248"/>
    <text x="38" y="360" fill="#A9B0C3" font-family="Inter, Arial, sans-serif" font-size="13">alex</text>
    <rect x="22" y="404" width="92" height="46" rx="14" fill="#20263A" stroke="#2B3248"/>
    <text x="68" y="432" text-anchor="middle" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Test</text>
    <rect x="126" y="404" width="92" height="46" rx="14" fill="url(#primary)"/>
    <text x="172" y="432" text-anchor="middle" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Sign in</text>
  </g>

  <!-- Home phone -->
  <g filter="url(#shadow)">
    <rect x="714" y="154" width="328" height="604" rx="42" fill="#070912"/>
    <rect x="728" y="168" width="300" height="576" rx="32" fill="#10131F"/>
    <rect x="826" y="181" width="104" height="18" rx="9" fill="#070912"/>
  </g>
  <g transform="translate(758 224)">
    <text x="0" y="0" fill="#AA5CC3" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="1.1">WELCOME BACK</text>
    <text x="0" y="44" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" letter-spacing="-1">alex</text>
    <text x="0" y="72" fill="#A9B0C3" font-family="Inter, Arial, sans-serif" font-size="13">https://jellyfin.example.com</text>
    <rect x="184" y="10" width="72" height="40" rx="13" fill="#20263A" stroke="#2B3248"/>
    <text x="220" y="35" text-anchor="middle" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Sign out</text>

    <text x="0" y="130" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Libraries</text>
    <g transform="translate(0 150)">
      <rect width="112" height="72" rx="18" fill="#20263A" stroke="#2B3248"/>
      <text x="16" y="32" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Movies</text>
      <text x="16" y="52" fill="#A9B0C3" font-family="Inter, Arial, sans-serif" font-size="12">movies</text>
    </g>
    <g transform="translate(124 150)">
      <rect width="112" height="72" rx="18" fill="#20263A" stroke="#2B3248"/>
      <text x="16" y="32" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Shows</text>
      <text x="16" y="52" fill="#A9B0C3" font-family="Inter, Arial, sans-serif" font-size="12">tvshows</text>
    </g>

    <text x="0" y="270" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Recently added</text>
    <g transform="translate(0 294)">
      <rect width="116" height="210" rx="20" fill="#171B2A" stroke="#2B3248"/>
      <rect width="116" height="146" rx="20" fill="url(#posterA)"/>
      <text x="58" y="86" text-anchor="middle" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">JF</text>
      <text x="14" y="170" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Cosmos</text>
      <text x="14" y="190" fill="#A9B0C3" font-family="Inter, Arial, sans-serif" font-size="11">Movie • 2024</text>
    </g>
    <g transform="translate(132 294)">
      <rect width="116" height="210" rx="20" fill="#171B2A" stroke="#2B3248"/>
      <rect width="116" height="146" rx="20" fill="url(#posterB)"/>
      <text x="58" y="86" text-anchor="middle" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">JF</text>
      <text x="14" y="170" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Ocean Life</text>
      <text x="14" y="190" fill="#A9B0C3" font-family="Inter, Arial, sans-serif" font-size="11">Series • 45m</text>
    </g>
  </g>

  <rect x="518" y="632" width="244" height="44" rx="22" fill="#171B2A" stroke="#2B3248"/>
  <circle cx="546" cy="654" r="7" fill="#7EE787"/>
  <text x="566" y="661" fill="#F6F7FB" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Static preview asset</text>
</svg>
