name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'App.tsx'
      - 'app.json'
      - 'babel.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'src/**'
      - '.github/workflows/android-apk.yml'

jobs:
  apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Create CI signing keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore android/app/github-actions-release.keystore \
            -alias github-actions \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=GitHub Actions,O=Jellyfin Mobile,C=US"

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=github-actions-release.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=github-actions \
            -Pandroid.injected.signing.key.password=android

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/*.apk artifacts/jellyfin-mobile-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-mobile-release-apk
          path: artifacts/jellyfin-mobile-release.apk
          if-no-files-found: error
